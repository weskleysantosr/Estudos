# CI só valida código (lint + testes) — nunca toca em Databricks/Postgres
# reais. Roda em PRs e pushes pra main sem precisar de nenhum secret.
name: ci

on:
  pull_request:
  push:
    branches: [main]

# Permissão mínima possível: workflow só lê o repo, não precisa escrever nada.
# Sem isto, o token do GITHUB_TOKEN herda permissões amplas por padrão.
permissions:
  contents: read

jobs:
  lint-and-test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: digimon-lakehouse/api/requirements-dev.txt

      - name: Instalar dependências
        working-directory: digimon-lakehouse/api
        run: pip install --no-cache-dir -r requirements-dev.txt ruff

      - name: Lint (ruff)
        working-directory: digimon-lakehouse/api
        run: ruff check .

      - name: Testes (pytest)
        working-directory: digimon-lakehouse/api
        run: pytest -v

  lint-ingestion-and-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install --no-cache-dir ruff
          pip install --no-cache-dir -r digimon-lakehouse/ingestion/requirements.txt
          pip install --no-cache-dir -r digimon-lakehouse/scripts/requirements.txt

      - name: Lint (ruff)
        run: ruff check digimon-lakehouse/ingestion digimon-lakehouse/scripts

      - name: Compilar (checagem de sintaxe)
        run: |
          python -m py_compile digimon-lakehouse/ingestion/*.py
          python -m py_compile digimon-lakehouse/scripts/*.py
